<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indeksowe Karaoke</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; transition: padding 0.3s; }
        .container { background-color: #1e1e1e; padding: 30px 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 20px; position: relative; transition: border-radius 0.3s, margin 0.3s; }
        h1 { text-align: center; color: #bb86fc; margin: 0 0 5px 0; font-size: 26px; }
        .schedule { text-align: center; color: #b3b3b3; font-size: 14px; margin-bottom: 5px; line-height: 1.5; }
        
        /* Przełącznik Języków */
        .lang-toggle { display: flex; justify-content: center; background: #2c2c2c; border-radius: 20px; padding: 4px; width: max-content; margin: 0 auto; margin-bottom: -10px; }
        .lang-btn { background: transparent; border: none; color: #888; font-weight: bold; font-size: 14px; padding: 6px 16px; border-radius: 16px; cursor: pointer; transition: 0.3s; margin: 0; }
        .lang-btn.active { background: #bb86fc; color: #000; box-shadow: 0 2px 8px rgba(187, 134, 252, 0.4); }

        label { font-size: 14px; color: #b3b3b3; margin-bottom: 8px; display: block; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 15px; background: #2c2c2c; border: 2px solid #333; color: white; border-radius: 8px; font-size: 16px; box-sizing: border-box; outline: none; transition: border-color 0.2s; }
        input[type="text"]:focus { border-color: #bb86fc; }
        
        .checkbox-container { display: flex; align-items: center; gap: 10px; background: #2c2c2c; padding: 15px; border-radius: 8px; border: 2px solid #333; cursor: pointer; }
        .checkbox-container label { margin: 0; cursor: pointer; font-size: 16px; color: white; flex: 1; line-height: 1.3; }
        .checkbox-container input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: #bb86fc; flex-shrink: 0; }

        /* Dodatkowy tekst o DJ-u */
        #urodzinySubText { display: none; font-size: 13px; color: #bb86fc; text-align: center; margin-top: -12px; margin-bottom: 5px; line-height: 1.4; font-weight: bold; }

        .input-group { position: relative; display: flex; flex-direction: column;}
        
        /* --- WYGLĄD LISTY PODPOWIEDZI --- */
        .suggestions-box { 
            background: #252525; border-radius: 8px; box-shadow: 0 8px 16px rgba(0,0,0,0.6); 
            max-height: 60vh; overflow-y: auto; display: none; margin-top: 8px; border: 1px solid #444; 
        }
        .suggestion-item { 
            padding: 16px 15px; border-bottom: 1px solid #333; display: flex; align-items: center; 
            cursor: pointer; font-size: 16px; color: #e0e0e0; transition: background 0.2s;
        }
        .suggestion-item:hover, .suggestion-item:active { background: #3a3a3a; }
        .suggestion-item:last-child { border-bottom: none; }
        
        .yt-suggestion-title { display: flex; flex-direction: column; gap: 4px; }
        .yt-suggestion-title .song-name { color: #fff; font-size: 15px; line-height: 1.2; }
        .yt-suggestion-title .channel-name { color: #bb86fc; font-size: 12px; }

        .no-results { padding: 20px 15px; text-align: center; color: #ff5252; font-size: 15px; line-height: 1.4; }
        .yt-header { padding: 10px 15px; color: #ff5252; font-weight: bold; font-size: 14px; border-bottom: 1px solid #444; background: #1e1e1e; position: sticky; top: 0; }

        /* --- TRYB WYSZUKIWANIA --- */
        body.search-focus-mode .hide-in-search,
        body.search-focus-mode #txtTitle,
        body.search-focus-mode #txtSchedule,
        body.search-focus-mode .lang-toggle { 
            display: none !important; 
        }
        
        body.search-focus-mode { padding: 0 !important; background-color: #1e1e1e; }
        body.search-focus-mode .container { 
            border-radius: 0 !important; 
            box-shadow: none !important; 
            padding-bottom: 80vh !important; 
            max-width: 100%;
        }
        
        /* Pokazujemy przycisk "Wróć" tylko w trybie wyszukiwania */
        body.search-focus-mode #backFromSearchBtn { display: block !important; }
        
        button { background-color: #bb86fc; color: #000; font-weight: bold; font-size: 18px; padding: 16px; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        button:active { background-color: #9965f4; transform: scale(0.98); }
        button:disabled { background-color: #555; color: #888; cursor: not-allowed; }
        
        .extra-info-text { text-align: center; font-size: 13px; color: #aaa; margin-top: 5px; line-height: 1.5; padding: 15px 10px; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }

        #loadingMsg, #successMsg { text-align: center; font-size: 14px; margin-top: -10px; }
        #successMsg { color: #4CAF50; display: none; font-size: 16px; padding: 15px; background: rgba(76, 175, 80, 0.1); border-radius: 8px; margin-bottom: 20px; }
        #successSummary { margin-top: 12px; padding: 12px; background: rgba(0, 0, 0, 0.25); border-radius: 8px; color: #e0e0e0; font-size: 14px; text-align: left; line-height: 1.6; border: 1px solid rgba(76, 175, 80, 0.2); }
        #redirectTimer { margin-top: 15px; font-weight: bold; color: #bb86fc; font-size: 14px; text-align: center; }
        #formContent { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        #ytGroup { display: none; background: rgba(255, 82, 82, 0.05); padding: 15px; border-radius: 8px; border: 1px dashed #ff5252; margin-top: 5px; }
        
        #searchYTHelper { margin: 0; padding: 0 16px; background: #ff0000; color: white; font-size: 16px; font-weight: bold; flex-shrink: 0; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; border: none; display: none; }
        #searchYTHelper:hover:not(:disabled) { background: #d50000; }
        #searchYTHelper:active:not(:disabled) { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="container" id="appContainer">
    <button id="backFromSearchBtn" style="display: none; background: transparent; color: #bb86fc; font-size: 16px; font-weight: bold; padding: 0 0 15px 0; margin: 0; border: none; cursor: pointer; text-align: left; box-shadow: none;">⬅ Wróć</button>

    <div class="lang-toggle">
        <button id="btnPl" class="lang-btn active" onclick="setLanguage('pl')">PL</button>
        <button id="btnEn" class="lang-btn" onclick="setLanguage('en')">EN</button>
    </div>

    <h1 id="txtTitle">KARAOKE INDEKS</h1>
    <div class="schedule" id="txtSchedule">
        Czwartek (20.00-1.00)<br>Piątek (21.00-2.00)<br>Niedziela (21.00-2.00)
    </div>
    
    <div id="loadingMsg" style="color: #bb86fc;">Pobieranie dostępnej bazy... ⏳</div>
    
    <div id="successMsg">
        <strong style="font-size: 18px;" id="txtSuccessTitle">✅ Zamówienie wysłane!</strong><br>
        <span style="font-size:13px; color: #81c784;" id="txtSuccessSub">Zaraz przygotujemy Twój utwór.</span>
        <div id="successSummary"></div>
        <div id="redirectTimer"></div>
    </div>

    <div id="formContent">
        <div class="input-group" id="searchInputGroup">
            <label for="szukaj" id="lblSzukaj">Tytuł Piosenki (Wymagane)</label>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="szukaj" placeholder="Zacznij wpisywać..." autocomplete="off" style="flex: 1;">
                <button type="button" id="searchYTHelper" title="Pobierz z YouTube">YT 🔗</button>
            </div>
            <div id="suggestions" class="suggestions-box"></div>
        </div>

        <div class="input-group hide-in-search" id="ytGroup">
            <label for="ytLink" style="color: #ff5252; margin-bottom: 5px;" id="lblYtLink">Link do YouTube</label>
            <small id="dbWarning" style="color: #ffaaaa; margin-bottom: 10px; display: block; font-size: 13px;">Wklej link do wersji Karaoke z YouTube poniżej:</small>
            <input type="text" id="ytLink" placeholder="Wklej link do wideo..." autocomplete="off" style="width: 100%; border-color: #ff5252; background: #222; box-sizing: border-box;">
        </div>

        <div class="input-group hide-in-search">
            <label for="imie" id="lblImie">Twoje lub Wasze imiona (Wymagane)</label>
            <input type="text" id="imie" placeholder="Wpisz imię..." autocomplete="off">
        </div>

        <div class="input-group hide-in-search">
            <label for="narodowosc" id="lblNarodowosc">Narodowość (Opcjonalnie)</label>
            <input type="text" id="narodowosc" placeholder="Np. Polska, UK, Spain..." autocomplete="off">
        </div>

        <div class="input-group hide-in-search">
            <label for="kod" id="lblKod">Kod Fast Pass / VIP (Opcjonalnie)</label>
            <input type="text" id="kod" placeholder="Wpisz 6-znakowy kod" maxlength="6" style="text-transform: uppercase;" autocomplete="off">
        </div>

        <div class="checkbox-container hide-in-search" onclick="document.getElementById('urodziny').click();">
            <label for="urodziny" id="lblUrodziny">Mam dzisiaj urodziny! 🎂</label>
            <input type="checkbox" id="urodziny" onclick="event.stopPropagation();">
        </div>
        <div id="urodzinySubText" class="hide-in-search">Podejdź do dj'a, zaśpiewamy 100 lat</div>

        <button id="submitBtn" class="hide-in-search" disabled>Wybierz utwór z bazy 🛑</button>
        
        <div id="extraInfoText" class="extra-info-text hide-in-search"></div>
    </div>
</div>

<script>
    // ==========================================
    // 🔑 TUTAJ WKLEJ SWÓJ KLUCZ YOUTUBE API:
    // ==========================================
    const YOUTUBE_API_KEY = 'AIzaSyBagT4e4vzZzEGNE-ffPMXMVvGZuntSoGk';
    // ==========================================

    const dict = {
        pl: {
            schedule: "Czwartek (20.00-1.00)<br>Piątek (21.00-2.00)<br>Niedziela (21.00-2.00)",
            loading: "Pobieranie dostępnej bazy... ⏳",
            loadingErr: "❌ Brak połączenia z bazą. Wpisz tytuł ręcznie.",
            successTitle: "✅ Zamówienie wysłane!",
            successSub: "Zaraz przygotujemy Twój utwór.",
            lblSzukaj: "Tytuł Piosenki (Wymagane)",
            plcSzukaj: "Zacznij wpisywać...",
            ytHelperTitle: "Pobierz link z YouTube",
            noResults: "⚠️ Brak wyników. Sprawdź literówki!<br><br>Jeśli utworu nie ma w bazie, kliknij przycisk <b>YT 🔗</b> obok, a znajdziemy i dopiszemy link za Ciebie!",
            dbWarning: "Wklej link do wersji Karaoke z YouTube poniżej:",
            lblYtLink: "Link do YouTube",
            plcYtLink: "Wklej link do wideo...",
            lblImie: "Twoje lub Wasze imiona (Wymagane)",
            plcImie: "Wpisz imię...",
            lblNarodowosc: "Narodowość (Opcjonalnie)",
            plcNarodowosc: "Np. Polska, UK, Spain...",
            lblKod: "Kod Fast Pass / VIP (Opcjonalnie)",
            plcKod: "Wpisz 6-znakowy kod",
            lblUrodziny: "Mam dzisiaj urodziny! 🎂",
            lblUrodzinySub: "Podejdź do dj'a, zaśpiewamy 100 lat 🎉",
            btnDefault: "Wybierz utwór z bazy 🛑",
            btnMissingTitle: "Wpisz tytuł utworu 🛑",
            btnMissingLink: "Wybierz z listy lub użyj YT 🔗 🛑",
            btnMissingName: "Wpisz swoje imię 🛑",
            btnReady: "Wyślij Zamówienie 🚀",
            btnSending: "Wysyłanie... ⏳",
            btnErr: "❌ Błąd, spróbuj ponownie",
            sumPerformer: "🎤 Wykonawca:",
            sumSong: "🎵 Utwór:",
            sumYt: "🔗 <i>Z własnego linku YT</i>",
            sumBday: "🎂 <i>Zgłoszono Urodziny!</i>",
            sumCode: "🎟️ <i>Kod VIP:</i>",
            redirect: "Powrót do formularza za: {s}s",
            extraInfo: "<b>INFORMACJA</b> (dotyczy niedzielnego karaoke):<br><br>Drodzy przyjaciele!<br>Do 23:30 możecie śpiewać piosenki popularne tylko w Waszym kraju.<br>Po 23:30 przełączamy się na anglojęzyczne największe hity 🎤<br>Wpisujcie swoje piosenki, które połączą wszystkich<br>i zmienią Klub INDEKS w jedną wielką imprezę!",
            btnBack: "⬅ Wróć",
            ytError: "Wystąpił błąd podczas szukania na YT.",
            ytSelectHeader: "Wybierz wersję z YouTube:"
        },
        en: {
            schedule: "Thursday (20.00-1.00)<br>Friday (21.00-2.00)<br>Sunday (21.00-2.00)",
            loading: "Loading available database... ⏳",
            loadingErr: "❌ Database connection error. Enter title manually.",
            successTitle: "✅ Order sent!",
            successSub: "We will prepare your song shortly.",
            lblSzukaj: "Song Title (Required)",
            plcSzukaj: "Start typing...",
            ytHelperTitle: "Get YouTube link",
            noResults: "⚠️ No results. Please check for typos!<br><br>If the song is missing, click the <b>YT 🔗</b> button and we'll find the link for you!",
            dbWarning: "Paste the YouTube Karaoke link below:",
            lblYtLink: "YouTube Link",
            plcYtLink: "Paste the video link...",
            lblImie: "Your name(s) (Required)",
            plcImie: "Enter name...",
            lblNarodowosc: "Nationality (Optional)",
            plcNarodowosc: "E.g. Poland, UK, Spain...",
            lblKod: "Fast Pass / VIP Code (Optional)",
            plcKod: "Enter 6-character code",
            lblUrodziny: "It's my birthday today! 🎂",
            lblUrodzinySub: "Come to the DJ, we'll sing Happy Birthday 🎉",
            btnDefault: "Choose a song from the database 🛑",
            btnMissingTitle: "Enter the song title 🛑",
            btnMissingLink: "Choose from list or use YT 🔗 🛑",
            btnMissingName: "Enter your name 🛑",
            btnReady: "Send Order 🚀",
            btnSending: "Sending... ⏳",
            btnErr: "❌ Error, try again",
            sumPerformer: "🎤 Performer:",
            sumSong: "🎵 Song:",
            sumYt: "🔗 <i>From custom YT link</i>",
            sumBday: "🎂 <i>Birthday Reported!</i>",
            sumCode: "🎟️ <i>VIP Code:</i>",
            redirect: "Returning to form in: {s}s",
            extraInfo: "<b>INFORMATION</b> (applies to Sunday karaoke events):<br><br>Dear friends!<br>Until 11.30 PM, you can sing songs popular only in your country.<br>After 11.30 PM, we switch to English-language best hits 🎤<br>Write down your songs that will bring everyone together<br>and turn INDEKS Club into one big party!",
            btnBack: "⬅ Back",
            ytError: "Error while searching YT.",
            ytSelectHeader: "Select YouTube version:"
        }
    };

    let curLang = 'pl';

    function setLanguage(lang) {
        curLang = lang;
        document.getElementById('btnPl').classList.toggle('active', lang === 'pl');
        document.getElementById('btnEn').classList.toggle('active', lang === 'en');
        document.documentElement.lang = lang;

        const d = dict[lang];
        document.getElementById('txtSchedule').innerHTML = d.schedule;
        if(document.getElementById('loadingMsg').textContent.includes('⏳')) document.getElementById('loadingMsg').textContent = d.loading;
        document.getElementById('txtSuccessTitle').textContent = d.successTitle;
        document.getElementById('txtSuccessSub').textContent = d.successSub;
        
        document.getElementById('lblSzukaj').textContent = d.lblSzukaj;
        document.getElementById('szukaj').placeholder = d.plcSzukaj;
        document.getElementById('searchYTHelper').title = d.ytHelperTitle;
        document.getElementById('dbWarning').textContent = d.dbWarning;
        
        document.getElementById('lblYtLink').textContent = d.lblYtLink;
        document.getElementById('ytLink').placeholder = d.plcYtLink;
        
        document.getElementById('lblImie').textContent = d.lblImie;
        document.getElementById('imie').placeholder = d.plcImie;
        
        document.getElementById('lblNarodowosc').textContent = d.lblNarodowosc;
        document.getElementById('narodowosc').placeholder = d.plcNarodowosc;
        
        document.getElementById('lblKod').textContent = d.lblKod;
        document.getElementById('kod').placeholder = d.plcKod;
        
        document.getElementById('lblUrodziny').textContent = d.lblUrodziny;
        document.getElementById('urodzinySubText').textContent = d.lblUrodzinySub;
        document.getElementById('extraInfoText').innerHTML = d.extraInfo;
        
        document.getElementById('backFromSearchBtn').textContent = d.btnBack;

        // Tłumaczenie tekstów dynamicznych (jeśli są akurat na ekranie)
        if (suggestionsBox.querySelector('.no-results')) {
            suggestionsBox.querySelector('.no-results').innerHTML = d.noResults;
        }
        if (suggestionsBox.querySelector('.yt-header')) {
            suggestionsBox.querySelector('.yt-header').innerHTML = d.ytSelectHeader;
        }

        checkInputs();
    }

    const GIST_ID = 'c3050f88e17d6e1ec9e86bdbea6277e0'; 
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxJ1_L6d8lFs8scNEiqd0kSKwm9tooJWr2sPrPlOsne_8zFB3ZTuBUgidpz9E-uGJ5U/exec';
    
    let baza = [];
    let isSelectedFromDb = false;
    let isFocusing = false;
    let isSending = false;

    // --- IDENTYFIKACJA URZĄDZENIA ---
    function getDeviceId() {
        let deviceId = localStorage.getItem('karaoke_device_id');
        if (!deviceId) {
            deviceId = 'id-' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('karaoke_device_id', deviceId);
        }
        return deviceId;
    }
    const currentDeviceId = getDeviceId();

    const szukajInput = document.getElementById('szukaj');
    const searchInputGroup = document.getElementById('searchInputGroup');
    const ytLinkInput = document.getElementById('ytLink');
    const ytGroup = document.getElementById('ytGroup');
    const searchYTHelper = document.getElementById('searchYTHelper');

    const imieInput = document.getElementById('imie');
    const narodowoscInput = document.getElementById('narodowosc');
    const kodInput = document.getElementById('kod');
    const urodzinyCheck = document.getElementById('urodziny');
    const urodzinySubText = document.getElementById('urodzinySubText');
    const suggestionsBox = document.getElementById('suggestions');
    const submitBtn = document.getElementById('submitBtn');
    const loadingMsg = document.getElementById('loadingMsg');
    
    const successMsg = document.getElementById('successMsg');
    const successSummary = document.getElementById('successSummary'); 
    const redirectTimer = document.getElementById('redirectTimer');
    
    const backFromSearchBtn = document.getElementById('backFromSearchBtn');

    urodzinyCheck.addEventListener('change', () => {
        urodzinySubText.style.display = urodzinyCheck.checked ? 'block' : 'none';
    });

    async function loadBaza() {
        try {
            const response = await fetch(`https://api.github.com/gists/${GIST_ID}`);
            const data = await response.json();
            baza = JSON.parse(data.files['baza.json'].content);
            loadingMsg.style.display = 'none';
            checkInputs();
        } catch (err) {
            loadingMsg.innerHTML = dict[curLang].loadingErr;
            loadingMsg.style.color = "#ff5252";
            checkInputs();
        }
    }
    loadBaza();

    function normalizeText(str) {
        return str.toLowerCase().replace(/[^\p{L}\p{N}\s]/gu, ' ').replace(/\s+/g, ' ').trim();
    }

    szukajInput.addEventListener('focus', () => {
        isFocusing = true; 
        document.body.classList.add('search-focus-mode');
        
        if (szukajInput.value.trim().length > 0) {
            szukajInput.dispatchEvent(new Event('input')); 
        }
        
        setTimeout(() => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }, 100);

        setTimeout(() => {
            isFocusing = false;
        }, 400);
    });

    // Przycisk "Wróć" zamykający tryb wyszukiwania
    backFromSearchBtn.addEventListener('click', () => {
        document.body.classList.remove('search-focus-mode');
        suggestionsBox.style.display = 'none';
        if (document.activeElement) document.activeElement.blur();
        checkInputs();
    });

    document.addEventListener('click', (e) => {
        if (isFocusing) return; 
        
        if (!e.target.closest('#searchInputGroup') && e.target !== backFromSearchBtn) {
            document.body.classList.remove('search-focus-mode');
            suggestionsBox.style.display = 'none';
            checkInputs(); 
        }
    });

    szukajInput.addEventListener('input', () => {
        isSelectedFromDb = false; 
        const rawQuery = szukajInput.value;
        suggestionsBox.innerHTML = '';
        
        const queryWords = normalizeText(rawQuery).split(' ').filter(w => w.length > 0);
        
        if (queryWords.length === 0) {
            suggestionsBox.style.display = 'none';
            searchYTHelper.style.display = 'none'; 
            checkInputs();
            return;
        }

        const matches = baza.filter(s => {
            const targetStr = normalizeText(s.title);
            return queryWords.every(word => targetStr.includes(word));
        }).slice(0, 15);
        
        if (matches.length > 0) {
            suggestionsBox.style.display = 'block';
            searchYTHelper.style.display = 'none'; 
            
            matches.forEach(song => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `🎵 <span>${song.title}</span>`;
                
                div.addEventListener('click', () => {
                    szukajInput.value = song.title;
                    isSelectedFromDb = true; 
                    suggestionsBox.style.display = 'none';
                    document.body.classList.remove('search-focus-mode'); 
                    checkInputs();
                });
                
                suggestionsBox.appendChild(div);
            });
        } else {
            suggestionsBox.style.display = 'block';
            searchYTHelper.style.display = 'flex'; 
            
            const div = document.createElement('div');
            div.className = 'no-results';
            div.innerHTML = dict[curLang].noResults;
            suggestionsBox.appendChild(div);
        }
        checkInputs();
    });

    // MAGIA YOUTUBE API: Zwraca 5 wyników prosto do okienka!
    searchYTHelper.addEventListener('click', async () => {
        const query = szukajInput.value.trim();
        if (!query) return;

        const originalText = searchYTHelper.innerHTML;
        searchYTHelper.innerHTML = '⏳...';
        searchYTHelper.disabled = true;

        try {
            // maxResults=5 zwraca top 5 najtrafniejszych (karaoke) wideo
            const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=${encodeURIComponent(query + ' karaoke')}&type=video&key=${YOUTUBE_API_KEY}`);
            const data = await response.json();

            if (data.items && data.items.length > 0) {
                // Wyczyszczenie okienka podpowiedzi
                suggestionsBox.innerHTML = '';
                
                // Dodanie nagłówka
                const header = document.createElement('div');
                header.className = 'yt-header';
                header.innerHTML = dict[curLang].ytSelectHeader;
                suggestionsBox.appendChild(header);

                // Renderowanie wyników
                data.items.forEach(item => {
                    const videoId = item.id.videoId;
                    const title = item.snippet.title;
                    const channel = item.snippet.channelTitle;
                    
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    
                    // Ładny podział na Tytuł i Kanał
                    div.innerHTML = `
                        <div class="yt-suggestion-title">
                            <span class="song-name">${title}</span>
                            <span class="channel-name">📺 ${channel}</span>
                        </div>
                    `;
                    
                    div.addEventListener('click', () => {
                        ytLinkInput.value = `https://www.youtube.com/watch?v=${videoId}`;
                        isSelectedFromDb = false; 
                        ytGroup.style.display = 'flex';
                        document.body.classList.remove('search-focus-mode');
                        suggestionsBox.style.display = 'none';
                        checkInputs();
                    });
                    
                    suggestionsBox.appendChild(div);
                });
                
                suggestionsBox.style.display = 'block';

            } else {
                alert(dict[curLang].noResults);
            }
        } catch (error) {
            console.error("Błąd YouTube API:", error);
            alert(dict[curLang].ytError);
        } finally {
            searchYTHelper.innerHTML = originalText;
            searchYTHelper.disabled = false;
        }
    });

    function checkInputs() {
        if (isSending) return; 

        const d = dict[curLang];
        const titleVal = szukajInput.value.trim();
        const hasTitle = titleVal.length > 0;
        const hasName = imieInput.value.trim().length > 0;
        
        if (hasTitle && !isSelectedFromDb) {
            const exactMatch = baza.find(s => s.title.toLowerCase() === titleVal.toLowerCase());
            if (exactMatch) {
                isSelectedFromDb = true;
                szukajInput.value = exactMatch.title; 
            }
        }

        const ytLinkVal = ytLinkInput.value.trim();
        const hasValidYtLink = ytLinkVal.length > 0 && (ytLinkVal.includes('youtube.com') || ytLinkVal.includes('youtu.be'));

        if (hasTitle && !isSelectedFromDb) {
            ytGroup.style.display = 'flex';
        } else {
            ytGroup.style.display = 'none';
            ytLinkInput.value = ''; 
        }

        if (hasName && hasTitle && (isSelectedFromDb || hasValidYtLink)) {
            submitBtn.disabled = false;
            submitBtn.textContent = d.btnReady;
        } else {
            submitBtn.disabled = true;
            if (!hasTitle) { submitBtn.textContent = d.btnMissingTitle; }
            else if (!isSelectedFromDb && !hasValidYtLink) { submitBtn.textContent = d.btnMissingLink; }
            else if (!hasName) { submitBtn.textContent = d.btnMissingName; }
            else { submitBtn.textContent = d.btnDefault; }
        }
    }
    
    imieInput.addEventListener('input', checkInputs);
    ytLinkInput.addEventListener('input', checkInputs);

    submitBtn.addEventListener('click', (e) => {
        isSending = true; 
        
        if (document.activeElement) document.activeElement.blur(); 

        const d = dict[curLang];
        
        submitBtn.disabled = true;
        submitBtn.textContent = d.btnSending;
        submitBtn.style.backgroundColor = "#555";
        submitBtn.style.color = "#888";

        void submitBtn.offsetHeight; 

        setTimeout(async () => {
            
            let summaryHtml = `${d.sumPerformer} <b>${imieInput.value.trim()}</b><br>${d.sumSong} <b>${szukajInput.value.trim()}</b>`;
            if (ytLinkInput.value.trim()) summaryHtml += `<br>${d.sumYt}`;
            if (urodzinyCheck.checked) summaryHtml += `<br>${d.sumBday}`;
            if (kodInput.value.trim()) summaryHtml += `<br>${d.sumCode} ${kodInput.value.trim().toUpperCase()}</i>`;
            successSummary.innerHTML = summaryHtml;

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ 
                        tytul: szukajInput.value.trim(),
                        url: ytLinkInput.value.trim(),
                        imie: imieInput.value.trim(), 
                        narodowosc: narodowoscInput.value.trim(),
                        kod: kodInput.value.trim().toUpperCase(),
                        urodziny: urodzinyCheck.checked,
                        deviceId: currentDeviceId // <-- WYSYŁKA ID TELEFONU
                    })
                });

                successMsg.style.display = 'block';
                document.getElementById('formContent').style.display = 'none';

                let timeLeft = 8;
                redirectTimer.textContent = d.redirect.replace('{s}', timeLeft);

                const countdown = setInterval(() => {
                    timeLeft--;
                    if (timeLeft >= 0) {
                        redirectTimer.textContent = d.redirect.replace('{s}', timeLeft);
                    }
                }, 1000);
                
                setTimeout(() => {
                    clearInterval(countdown); 
                    isSending = false; 

                    successMsg.style.display = 'none';
                    document.getElementById('formContent').style.display = 'flex';
                    szukajInput.value = '';
                    ytLinkInput.value = '';
                    imieInput.value = '';
                    narodowoscInput.value = '';
                    kodInput.value = '';
                    
                    urodzinyCheck.checked = false;
                    urodzinySubText.style.display = 'none';
                    
                    isSelectedFromDb = false;
                    
                    submitBtn.style.backgroundColor = "";
                    submitBtn.style.color = "";
                    checkInputs();
                }, 8000);

            } catch (error) {
                isSending = false; 
                submitBtn.innerHTML = d.btnErr;
                submitBtn.style.backgroundColor = "#ff5252";
                submitBtn.style.color = "#fff";
                setTimeout(() => { 
                    submitBtn.style.backgroundColor = "";
                    submitBtn.style.color = "";
                    checkInputs(); 
                }, 3000);
            }

        }, 500); 
    });

    setLanguage('pl');
</script>
</body>
</html>
